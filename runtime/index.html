<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>demo</title>
</head>

<body>
    <script type="module">
        import f from './f.js'

        function App() {
            const count = f.signal([1, 2, 3])
            return (() => {
                let f0, f1;
                f1 = f.ce('div');
                f.ac(f0, f1);
                f.ael(f1, 'onclick', ()=>{
                    count([3,2,1])
                });

                
                f.computed(() => count()
                    .map((c,i) => (() => {
                        let f0, f2;
                        f2 = f.ce('button');
                        f.computed(() => f.stc(f2, c));
                        f.ac(f1, f2,i);
                        return f1;
                    })())
                );
                return f1;
            })();
        }

        document.body.appendChild(App())

    </script>
</body>

</html>
